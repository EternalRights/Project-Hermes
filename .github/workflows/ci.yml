name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hermes_test
          MYSQL_USER: hermes
          MYSQL_PASSWORD: hermes123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hermes-server/requirements.txt
          pip install -r hermes-worker/requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_SECRET_KEY: ci-test-jwt-secret-key-not-for-production
          DATABASE_URL: mysql+pymysql://hermes:hermes123@127.0.0.1:3306/hermes_test
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
        run: |
          pytest tests/ --cov=hermes_core --cov=hermes_server --cov=hermes_worker --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: |
          pip install ruff mypy

      - name: Run Ruff check
        run: ruff check hermes-core/ hermes-server/ hermes-worker/ --config pyproject.toml

      - name: Run Ruff format check
        run: ruff format --check hermes-core/ hermes-server/ hermes-worker/ --config pyproject.toml

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t hermes-server ./hermes-server

      - name: Build worker image
        run: docker build -t hermes-worker ./hermes-worker
